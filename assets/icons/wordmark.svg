<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 140" font-family="'JetBrains Mono','Fira Code',monospace">
  <defs>
    <linearGradient id="neonSoft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ff2bd6"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- mini badge -->
  <g transform="translate(4 4)">
    <path d="M28 4 H104 L132 32 V104 L104 132 H28 L0 104 V32 Z" fill="#070b12" stroke="url(#neonSoft)" stroke-width="4"/>
    <g filter="url(#glow)" stroke="url(#neonSoft)" stroke-width="8" stroke-linecap="round">
      <line x1="48" y1="42" x2="38" y2="94"/>
      <line x1="86" y1="42" x2="76" y2="94"/>
      <line x1="34" y1="56" x2="96" y2="56"/>
      <line x1="30" y1="80" x2="92" y2="80"/>
    </g>
    <rect x="98" y="76" width="10" height="15" fill="#4dff9e"/>
  </g>

  <!-- wordmark text -->
  <text x="156" y="90" font-size="64" font-weight="700" fill="#d6ecf3" letter-spacing="1">root<tspan fill="#00f0ff">Quest</tspan></text>
  <!-- blinking cursor -->
  <rect x="610" y="42" width="14" height="50" fill="#4dff9e" filter="url(#glow)"/>
</svg>
