<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b12"/>
      <stop offset="100%" stop-color="#04060a"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="55%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ff2bd6"/>
    </linearGradient>
    <linearGradient id="neonSoft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff2bd6" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base plate, cut-corner HUD panel like the in-app panels -->
  <path d="M96 16 H416 L496 96 V416 L416 496 H96 L16 416 V96 Z"
        fill="url(#bgGrad)" stroke="url(#neon)" stroke-width="10"/>

  <!-- inner hairline frame -->
  <path d="M84 40 H428 L472 84 V428 L428 472 H84 L40 428 V84 Z"
        fill="none" stroke="#00f0ff" stroke-opacity="0.22" stroke-width="3"/>

  <!-- faint circuit grid -->
  <g stroke="#00f0ff" stroke-opacity="0.14" stroke-width="2">
    <line x1="16" y1="176" x2="96" y2="176"/>
    <line x1="16" y1="336" x2="96" y2="336"/>
    <line x1="416" y1="176" x2="496" y2="176"/>
    <line x1="416" y1="336" x2="496" y2="336"/>
  </g>

  <!-- corner reticle ticks -->
  <g stroke="#4dff9e" stroke-width="6" stroke-linecap="square" filter="url(#glowSoft)">
    <path d="M40 96 V60 M40 60 H76" fill="none"/>
    <path d="M472 96 V60 M472 60 H436" fill="none"/>
    <path d="M40 416 V452 M40 452 H76" fill="none"/>
    <path d="M472 416 V452 M472 452 H436" fill="none"/>
  </g>

  <!-- root prompt glyph: "#" built from crisp bars, terminal style -->
  <g filter="url(#glow)">
    <g stroke="url(#neonSoft)" stroke-width="26" stroke-linecap="round">
      <line x1="182" y1="164" x2="150" y2="348"/>
      <line x1="302" y1="164" x2="270" y2="348"/>
      <line x1="130" y1="212" x2="342" y2="212"/>
      <line x1="112" y1="300" x2="324" y2="300"/>
    </g>
  </g>

  <!-- terminal cursor block, blinking-block motif -->
  <rect x="352" y="288" width="34" height="52" fill="#4dff9e" filter="url(#glowSoft)"/>
</svg>
